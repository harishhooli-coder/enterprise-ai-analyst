# fly.toml — Data-Answers Agent API (IF-RES-2026-061)
# Deploy: fly deploy (from data-answers-agent/)

app = "data-answers-agent"
primary_region = "iad"

[build]

[env]
  WAREHOUSE_BACKEND = "mock"
  BQ_USE_MOCK = "1"
  LOG_LEVEL = "INFO"
  IDENTITY_MODE = "stub"
  CORS_ORIGINS = "https://data-answers-ui.vercel.app,http://localhost:3000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
